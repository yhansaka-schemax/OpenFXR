name: Scrape FX Rates

on:
  schedule:
    # 3x daily — 8:30am, 12:30pm, 4:30pm Sri Lanka time (UTC+5:30)
    - cron: '0 3,7,11 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scraper/package-lock.json

      - name: Install scraper dependencies
        working-directory: scraper
        run: npm ci

      - name: Run scraper
        working-directory: scraper
        env:
          EXCHANGERATE_API_KEY: ${{ secrets.EXCHANGERATE_API_KEY }}
        run: node index.js

      - name: Commit and push rate data
        run: |
          git config user.name "FXRScout Bot"
          git config user.email "fxrscout-bot@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: update FX rates [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
